services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: approval_service
      POSTGRES_USER: approval
      POSTGRES_PASSWORD: approval
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U approval -d approval_service"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://approval:approval@db:5432/approval_service
    ports:
      - "8000:8000"
